{% extends "optamos/_base.html" %}

{% block title %}
  Create new project
{% endblock %}

{% block content %}

<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-10 text-center text-3xl/9 font-bold tracking-tight text-gray-900">Create new project</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

    <form method="POST" class="space-y-6" enctype="multipart/form-data">
      {% csrf_token %}
      <div>
        <label for="name" class="block font-medium text-gray-900">Project name</label>
        <div class="mt-2">
          <input value="{{ request.POST.name }}" id="name" type="text" name="name"  class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="goal" class="block font-medium text-gray-900">Project goal</label>
        </div>
        <div class="mt-2">
          <input value="{{ request.POST.goal }}" id="goal" type="text" name="goal" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="goal" class="block font-medium text-gray-900">Criteria</label>
        </div>
        <div class="mt-4">
          <button type="button" id="openCsvModal"
            class="flex items-center gap-2 text-sm font-medium text-cyan-700 hover:text-cyan-900 transition cursor-pointer">
            
            <!-- Icon (Heroicons upload) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 12V3m0 0l-3 3m3-3l3 3" />
            </svg>

            Upload criteria and alternatives as CSV files
          </button>
        </div>
        <div class="mt-2">
          <textarea class="h-32" name="criteria" placeholder="Enter each on a new line; one-word criteria are best, e.g. 'Ecological', 'Social', or 'Cultural'. You will be able to add optional descriptions later.">{{ request.POST.criteria }}</textarea>
        </div>
      </div>

      <section>
        <div class="flex items-center justify-between">
          <label class="block font-medium text-gray-900">Alternatives</label>
        </div>
        <div class="mt-2">
          <input type="text" name="alternative" />
        </div>
      </section>

      <section class="bg-gray-100 p-4 rounded-lg">
        <h3>Meta data (optional)</h3>
        <div>
          <div class="flex items-center justify-between">
            <label for="goal" class="block font-medium text-gray-900">Description</label>
          </div>
          <div class="mt-2">
            <textarea class="h-32" name="description" placeholder="Short description of your project">{{ request.POST.description }}</textarea>
          </div>
        </div>

        <section class="mt-4">
          <div class="flex items-center justify-between">
            <label class="block font-medium text-gray-900">Tag(s)</label>
          </div>
          <div class="mt-2">
            <input type="text" name="tag" />
          </div>
        </section>
      </section>

      <div>
        <button type="submit" class="flex w-full justify-center btn-blue px-3 py-1.5 font-semibold text-white shadow-xs focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600 font-medium cursor-pointer">Create project</button>
      </div>

      <!-- CSV Upload Modal -->
      <div id="csvModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
          
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-900">Upload CSV</h2>
            <button class="close-modal text-gray-400 hover:text-gray-600 text-xl">&times;</button>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Select CSV file
            </label>
            <input type="file" name="csv_file" accept=".csv"
              class="block w-full text-sm text-gray-900 border border-gray-300 rounded-md cursor-pointer focus:outline-none focus:ring-2 focus:ring-cyan-600" />
          </div>

          <div class="mt-3 text-sm">
            <a href="/media/optamos/sample.csv">Download sample file</a>
          </div>

          <div class="mt-6 flex justify-end gap-3">
            <button type="button"
              class="px-4 py-2 close-modal text-sm rounded-md border border-gray-300 text-gray-700 hover:bg-gray-100">
              Cancel
            </button>

            <button type="submit"
              class="px-4 py-2 text-sm font-semibold text-white bg-cyan-600 rounded-md hover:bg-cyan-700">
              Upload
            </button>
          </div>

        </div>
      </div>

    </form>

  </div>
</div>

{% endblock %}

{% block js %}
<script type="text/javascript">
$(function(){
  $("section").on("input", "input[name='alternative']", function() {
    if ($(this).data("is-typed") !== true) {
      var newDiv = $(this).closest("div").clone();
      newDiv.find("input").val(""); // Clear the cloned input
      $(this).closest("section").append(newDiv);
      $(this).data("is-typed", true); // Mark this input as typed
    }
  }); 
  $("section").on("input", "input[name='tag']", function() {
    if ($(this).data("is-typed") !== true) {
      var newDiv = $(this).closest("div").clone();
      newDiv.find("input").val(""); // Clear the cloned input
      $(this).closest("section").append(newDiv);
      $(this).data("is-typed", true); // Mark this input as typed
    }
  }); 

  const modal = $("#csvModal");

  $("#openCsvModal").on("click", function () {
    modal.removeClass("hidden").addClass("flex");
  });

  function closeModal() {
    modal.addClass("hidden").removeClass("flex");
  }

  $(".close-modal").on("click", function () {
    closeModal();
  });

  // Close when clicking outside modal content
  modal.on("click", function (e) {
    if ($(e.target).is("#csvModal")) {
      closeModal();
    }
  });

});
</script>

  
{% endblock %}
