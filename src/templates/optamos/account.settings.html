{% extends "optamos/_base.html" %}

{% block title %}
  Your account
{% endblock %}

{% block content %}

<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">

    <div class="sm:mx-auto sm:w-full sm:max-w-sm">
      <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900">Your Account</h2>
    </div>

    <form method="POST" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="name" class="block text-sm/6 font-medium text-gray-900">Name</label>
        <div class="mt-2">
          <input id="name" value="{% if request.user.first_name != request.user.email %}{{ request.user.first_name }}{% endif %}" 
            type="text" name="name" required autocomplete="name" 
            class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-900">Email address</label>
        <div class="mt-2">
          <input id="email" type="email" value="{{ request.user.email }}" name="email" required autocomplete="email" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <label for="institution" class="block text-sm/6 font-medium text-gray-900">Institution</label>
        <div class="mt-2">
          <input id="institution" type="text" value="{{ request.user.people.meta_data.institution }}" name="institution" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <label for="location" class="block text-sm/6 font-medium text-gray-900">Location</label>
        <div class="mt-2">
          <input id="location" type="text" value="{{ request.user.people.meta_data.location }}" name="location" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <label for="how" class="block text-sm/6 font-medium text-gray-900">How do you plan to use OPTamos?</label>
        <div class="mt-2">
          <select name="how" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6">
            <option value=""></option>
            <option value="academic" {% if request.user.people.meta_data.how == "academic" %}selected{% endif %}>Academic use</option>
            <option value="personal" {% if request.user.people.meta_data.how == "personal" %}selected{% endif %}>Personal use</option>
            <option value="work" {% if request.user.people.meta_data.how == "work" %}selected{% endif %}>For work</option>
            <option value="other" {% if request.user.people.meta_data.how == "other" %}selected{% endif %}>Other</option>
          </select>
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm/6 font-medium text-gray-900">Change password</label>
        <div class="mt-2">
          <input id="password" type="password" name="password" autocomplete="current-password" class="block w-full rounded-md bg-white px-3 py-1.5 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-cyan-600 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <button type="submit" class="flex w-full justify-center btn-blue px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600 cursor-pointer">Save changes</button>
      </div>
    </form>

  </div>
</div>

{% endblock %}
